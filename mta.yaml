

_schema-version: 3.3.0
ID: project_management_capm
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
 before-all:
  - builder: custom
    commands:
      - npm ci
      - npx cds build --production
modules:
  - name: project_management_capm-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      memory: 512M
      disc-quota: 1G
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: project_management_capm-postgres
 
  - name: project_management_capm-postgres-deployer
    type: nodejs
    path: gen/pg
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-to-postgresql
          command: npm start
    requires:
      - name: project_management_capm-postgres
 
resources:
  - name: project_management_capm-postgres
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: PGSQL_INS